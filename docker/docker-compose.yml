name: airline

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airline}
      POSTGRES_USER: ${POSTGRES_USER:-airline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airline123.}
    ports:
      - "${POSTGRES_PORT:-5555}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-airline_user} -d ${POSTGRES_DB:-airline}
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: